<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form method="POST">
    <label>Username:</label>
    <input type="text" name="username" placeholder="Enter username" required><br><br>

    <label>Role:</label>
    <select name="role">
        <option value="developer">Developer</option>
        <option value="client">Client</option>
    </select><br><br>

    <button type="submit">Login</button>
</form>

</body>
</html>
