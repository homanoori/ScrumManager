<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #333; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        form.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
        form.row label { display: block; font-size: 0.85rem; margin-bottom: 2px; }
        form.row input, form.row select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 3px; }
        form.row button { padding: 7px 16px; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .btn-add { background: #333; }
        .btn-log { background: #27ae60; }
        .btn-update { background: #2980b9; }
        h2 { margin-top: 2rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/backlog">Product Backlog</a>
        <a href="/sprint">Sprint Backlog</a>
        <a href="/tasks">Tasks</a>
        <a href="/reports">Reports</a>
    </nav>
    <div class="content">
        <h1>Tasks</h1>

        <h2>Add Task to a PBI</h2>
        <form class="row" action="/tasks/add" method="post">
            <div>
                <label>Task Title</label>
                <input type="text" name="title" required placeholder="e.g. Write unit tests">
            </div>
            <div>
                <label>Estimated Effort (h)</label>
                <input type="number" name="effort" min="0.5" step="0.5" required placeholder="e.g. 3">
            </div>
            <div>
                <label>Belongs to PBI</label>
                <select name="pbi_id" required>
                    {% for pbi in pbis %}
                        <option value="{{ pbi[0] }}">{{ pbi[1] }}</option>
                    {% else %}
                        <option disabled>No PBIs yet</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <button type="submit" class="btn-add">Add Task</button>
            </div>
        </form>

        <h2>All Tasks</h2>
        {% if tasks %}
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>PBI</th>
                    <th>Update Status</th>
                </tr>
            </thead>
            <tbody>
            {% for t in tasks %}
                <tr>
                    <td>{{ t[0] }}</td>
                    <td>{{ t[1] }}</td>
                    <td>{{ t[2] }}</td>
                    <td>{{ t[3] }}</td>
                    <td>{{ t[5] or '—' }}</td>
                    <td>
                        <form action="/tasks/update_status" method="post" style="display:inline">
                            <input type="hidden" name="task_id" value="{{ t[0] }}">
                            <input type="hidden" name="status" value="Not Started">
                            <button type="submit">Not Started</button>
                        </form>
                        <form action="/tasks/update_status" method="post" style="display:inline">
                            <input type="hidden" name="task_id" value="{{ t[0] }}">
                            <input type="hidden" name="status" value="In Progress">
                            <button type="submit">In Progress</button>
                        </form>
                        <form action="/tasks/update_status" method="post" style="display:inline">
                            <input type="hidden" name="task_id" value="{{ t[0] }}">
                            <input type="hidden" name="status" value="Done">
                            <button type="submit">Done</button>

                        </form>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        {% else %}
            <p>No tasks yet.</p>
        {% endif %}
    </div>
</body>
</html>
